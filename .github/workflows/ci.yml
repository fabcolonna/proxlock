name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-lint:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: brew bundle

      - name: Check formatting
        run: make format-check

      - name: Lint
        run: make lint

      - name: Build
        run: make build
