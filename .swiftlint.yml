included:
  - ProxLock

excluded:
  - build
  - DerivedData
  - ProxLock.xcodeproj

analyzer_rules:
  - unused_declaration
  - unused_import

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fallthrough
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_parameters
  - no_extension_access_modifier
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - private_action
  - private_outlet
  - prohibited_super_call
  - reduce_into
  - redundant_nil_coalescing
  - sorted_first_last
  - sorted_imports
  - static_operator
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

disabled_rules:
  - todo

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - i

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: false

file_length:
  warning: 400
  error: 600

type_body_length:
  warning: 250
  error: 400

function_body_length:
  warning: 60
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 15

type_name:
  min_length: 3
  max_length:
    warning: 45
    error: 60

large_tuple:
  warning: 3
  error: 4

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

custom_rules:
  no_nsdata:
    name: "Prefer Data over NSData"
    regex: "\\bNSData\\b"
    message: "Use Swift Data instead of Foundation NSData."
    severity: warning
  no_print:
    name: "Use unified logging"
    regex: "\\bprint\\("
    message: "Use PLLogger or OSLog instead of print."
    severity: warning
  no_fileprivate:
    name: "Prefer private over fileprivate"
    regex: "\\bfileprivate\\b"
    message: "Use private unless file-wide access is required."
    severity: warning
